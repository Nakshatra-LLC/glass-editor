name: Release

# Runs on every push to main. The Changesets action either:
#   - Opens/updates a "Version Packages" PR when changesets are present, OR
#   - Publishes to npm when that PR is merged (no changesets remain).
#
# Publishing uses npm Trusted Publishing (OIDC) — NO NPM_TOKEN secret required.
# One-time setup on npm: the package → Settings → Trusted Publisher → GitHub Actions,
# repo Nakshatra-LLC/clean-editor, workflow release.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags + push version commits
  pull-requests: write  # open / update the "Version Packages" PR
  id-token: write       # OIDC token for npm provenance attestation

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Changesets can diff commits
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OIDC trusted publishing needs npm >= 11.5; Node 20 ships npm 10.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — auth is via OIDC trusted publishing; provenance is automatic.
          NPM_CONFIG_PROVENANCE: "true"
