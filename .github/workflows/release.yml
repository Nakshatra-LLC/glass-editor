name: Release

# Runs on every push to main. The Changesets action either:
#   - Opens/updates a "Version Packages" PR when changesets are present, OR
#   - Publishes to npm when that PR is merged (no changesets remain).
#
# REQUIRED repo secret: NPM_TOKEN — create an npm Automation/Granular Access Token
# scoped to @nakshatra.io/clean-editor and add it under
# Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags + push version commits
  pull-requests: write  # open / update the "Version Packages" PR
  id-token: write       # OIDC token for npm provenance attestation

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Changesets can diff commits
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Tell npm to attach a signed provenance attestation on publish.
          NPM_CONFIG_PROVENANCE: "true"
