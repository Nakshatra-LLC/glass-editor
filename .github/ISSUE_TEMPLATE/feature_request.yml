name: Feature request
description: Suggest an idea or enhancement for @nakshatra/glass-editor
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or hard today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. Sketch an API if relevant.
      placeholder: Add a prop / export / slash item that ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or current workarounds.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: This library is OSS-only and domain-agnostic by design.
      options:
        - label: This stays OSS-only (no TipTap Pro/Cloud) and free of host/domain coupling.
          required: true
